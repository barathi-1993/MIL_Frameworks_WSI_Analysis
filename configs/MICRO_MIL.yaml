General:
    MODEL_NAME: Micro_MIL
    seed: 2024
    num_classes: 2
    num_epochs: 5
    device: 1
    num_workers: 4
    best_model_metric: macro_auc  
    earlystop: 
        use: False
        patience: 5
        metric: macro_auc

Dataset:
    DATASET_NAME: STANFORD
    # when used a single csv file
    dataset_csv_path: None
    # when used multiple folds in a folder
    dataset_root_dir: None
    # feature extractor used
    feature_extractor: resnet50_1024
    
    balanced_sampler:
        use: False
        replacement: True

Logs:
    log_root_dir: logs/CLAM

Model:
    in_dim: 1024
    dropout: 0.5
    act: relu
    cluster_number: 36  # Number of clusters
    hidden_dim: 128  # Hidden dimension for GAT
    layer: 2  # Number of GAT layers
    alpha: 1.0  # Alpha parameter for DEC clustering
    shuffle: False  # Whether to shuffle graph edges
    optimizer:
        which: adam
        adam_config:
            lr: 0.0002
            weight_decay: 0.00001
        adamw_config:
            lr: 0.0002
            weight_decay: 0.00001
    criterion: ce
    scheduler:
        warmup: 2
        which: step
        step_config:
            step_size: 3
            gamma: 0.9
        multi_step_config:
            milestones: [20, 30, 40]
            gamma: 0.9
        exponential_config:
            gamma: 0.9
        cosine_config:
            T_max: 10
            eta_min: 0.0001